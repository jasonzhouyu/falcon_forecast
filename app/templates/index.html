<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猛禽迁徙预测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-top: 50px;
            border-radius: 10px;
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        .site-card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .site-card:hover {
            background-color: #f0f0f0;
        }
        
        .site-card.selected {
            background-color: #e3f2fd;
            border-color: #2196f3;
        }
        
        .date-card {
            display: inline-block;
            width: 120px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .date-card:hover {
            background-color: #f0f0f0;
        }
        
        .date-card.selected {
            background-color: #e3f2fd;
            border-color: #2196f3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦅 猛禽迁徙预测系统</h1>
        <form action="/predict" method="POST">
            <div class="form-group">
                <label for="site">选择监测站点：</label>
                <select name="site" id="site" required>
                    {% for site in sites %}
                    <option value="{{ site.id }}">{{ site.name }} ({{ site.type }}) - {{ site.desc }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="date">选择日期：</label>
                <select name="date" id="date" required>
                    {% for date in date_list %}
                    <option value="{{ date.date }}">{{ date.display }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit">获取预测</button>
        </form>
    </div>
</body>
</html>
